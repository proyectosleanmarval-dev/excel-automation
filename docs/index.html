<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Estado Obra - Bogotá</title>
    <style>
        body { font-family: Arial; margin: 40px; }
        table { border-collapse: collapse; width: 60%; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
    </style>
</head>
<body>

<h2>Estado Obra - Registros Bogotá</h2>

<table id="tabla"></table>

<script>
const csvUrl = window.location.pathname.replace("index.html","") + "estadoObra_filtrado.csv";

fetch(csvUrl)
    .then(response => {
        if (!response.ok) {
            throw new Error("No se encontró el CSV en: " + csvUrl);
        }
        return response.text();
    })
    .then(data => {
        const rows = data.trim().split('\n');
        const table = document.getElementById('tabla');

        rows.forEach((row, index) => {
            const cols = row.split(',');
            const tr = document.createElement('tr');

            cols.forEach(col => {
                const cell = document.createElement(index === 0 ? 'th' : 'td');
                cell.textContent = col;
                tr.appendChild(cell);
            });

            table.appendChild(tr);
        });
    })
    .catch(error => {
        document.body.innerHTML += "<p style='color:red'>" + error.message + "</p>";
    });
</script>

</body>
</html>
