<script>
const csvUrl = "estadoObra_filtrado.csv";

fetch(csvUrl)
    .then(response => {
        if (!response.ok) {
            throw new Error("No se encontró el archivo de datos");
        }
        return response.text();
    })
    .then(data => {

        const rows = data.trim().split('\n');
        const headers = rows[0].split(',');
        const dataRows = rows.slice(1).map(row => row.split(','));

        const idxFecha = headers.indexOf('fechaRegistro');
        const idxProyecto = headers.indexOf('descProyecto');

        if (idxFecha === -1 || idxProyecto === -1) {
            throw new Error("No se encontraron las columnas 'fechaRegistro' o 'descProyecto'");
        }

        const hoy = new Date();

        const mesActual = hoy.getMonth();
        const añoActual = hoy.getFullYear();

        const mesAnterior = mesActual === 0 ? 11 : mesActual - 1;
        const añoMesAnterior = mesActual === 0 ? añoActual - 1 : añoActual;

        const nombreMesActual = hoy.toLocaleString('es', { month: 'long' });

        const fechaMesAnterior = new Date(añoMesAnterior, mesAnterior, 1);
        const nombreMesAnterior = fechaMesAnterior.toLocaleString('es', { month: 'long' });

        document.getElementById('info-mes').textContent =
            `Comparación de registros: ${nombreMesActual} vs ${nombreMesAnterior} (${añoActual})`;

        const conteoActual = {};
        const conteoAnterior = {};

        dataRows.forEach(row => {

            const proyecto = row[idxProyecto]?.trim() || "Sin proyecto";
            const fechaStr = row[idxFecha]?.trim();

            if (fechaStr) {

                const fecha = new Date(fechaStr);

                if (!isNaN(fecha)) {

                    if (fecha.getMonth() === mesActual && fecha.getFullYear() === añoActual) {
                        conteoActual[proyecto] = (conteoActual[proyecto] || 0) + 1;
                    }

                    if (fecha.getMonth() === mesAnterior && fecha.getFullYear() === añoMesAnterior) {
                        conteoAnterior[proyecto] = (conteoAnterior[proyecto] || 0) + 1;
                    }
                }
            }

        });

        const todosProyectos = [...new Set(dataRows.map(row =>
            row[idxProyecto]?.trim() || "Sin proyecto"
        ))].sort();

        const valoresActual = todosProyectos.map(p => conteoActual[p] || 0);
        const valoresAnterior = todosProyectos.map(p => conteoAnterior[p] || 0);

        const ctx = document.getElementById('grafico').getContext('2d');

        new Chart(ctx, {

            type: 'bar',

            data: {
                labels: todosProyectos,
                datasets: [

                    {
                        label: `Mes actual (${nombreMesActual})`,
                        data: valoresActual,
                        backgroundColor: 'rgba(54, 162, 235, 0.7)',
                        borderColor: 'rgba(54, 162, 235, 1)',
                        borderWidth: 1
                    },

                    {
                        label: `Mes anterior (${nombreMesAnterior})`,
                        data: valoresAnterior,
                        backgroundColor: 'rgba(255, 159, 64, 0.7)',
                        borderColor: 'rgba(255, 159, 64, 1)',
                        borderWidth: 1
                    }

                ]
            },

            options: {

                responsive: true,

                indexAxis: 'y', // <- ESTO LO HACE HORIZONTAL

                plugins: {
                    legend: {
                        position: 'top'
                    }
                },

                scales: {

                    x: {
                        beginAtZero: true,
                        title: {
                            display: true,
                            text: 'Cantidad de registros'
                        }
                    },

                    y: {
                        title: {
                            display: true,
                            text: 'Proyecto'
                        }
                    }

                }

            }

        });

    })
    .catch(error => {
        document.body.innerHTML +=
            `<div style="color:red;text-align:center;margin-top:50px">
            ❌ Error: ${error.message}
        </div>`;
    });

</script>
