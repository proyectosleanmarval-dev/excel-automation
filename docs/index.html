<script>

const csvUrl = "estadoObra_filtrado.csv";

fetch(csvUrl)
.then(response => {
    if (!response.ok) {
        throw new Error("No se encontró el archivo de datos");
    }
    return response.text();
})
.then(data => {

    const rows = data.trim().split('\n');
    const headers = rows[0].split(',');
    const dataRows = rows.slice(1).map(r => r.split(','));

    const idxFecha = headers.indexOf('fechaRegistro');
    const idxProyecto = headers.indexOf('descProyecto');
    const idxTipo = headers.indexOf('tipoRestriccion');

    if (idxFecha === -1 || idxProyecto === -1 || idxTipo === -1) {
        throw new Error("No se encontraron columnas requeridas");
    }

    const hoy = new Date();
    const mesActual = hoy.getMonth();
    const añoActual = hoy.getFullYear();

    const mesAnterior = mesActual === 0 ? 11 : mesActual - 1;
    const añoMesAnterior = mesActual === 0 ? añoActual - 1 : añoActual;

    const nombreMesActual = hoy.toLocaleString('es', { month: 'long' });
    const nombreMesAnterior = new Date(añoMesAnterior, mesAnterior, 1)
        .toLocaleString('es', { month: 'long' });

    document.getElementById('info-mes').textContent =
        `Comparación de registros: ${nombreMesActual} vs ${nombreMesAnterior}`;

    const proyectos = new Set();
    const tipos = new Set();

    dataRows.forEach(r => {
        proyectos.add(r[idxProyecto]?.trim() || "Sin proyecto");
        tipos.add(r[idxTipo]?.trim() || "Sin tipo");
    });

    const listaProyectos = [...proyectos].sort();
    const listaTipos = [...tipos];

    const conteoActual = {};
    const conteoAnterior = {};

    listaTipos.forEach(tipo => {
        conteoActual[tipo] = {};
        conteoAnterior[tipo] = {};
    });

    dataRows.forEach(row => {

        const proyecto = row[idxProyecto]?.trim() || "Sin proyecto";
        const tipo = row[idxTipo]?.trim() || "Sin tipo";
        const fechaStr = row[idxFecha]?.trim();

        if (!fechaStr) return;

        const fecha = new Date(fechaStr);
        if (isNaN(fecha)) return;

        if (fecha.getMonth() === mesActual && fecha.getFullYear() === añoActual) {
            conteoActual[tipo][proyecto] = (conteoActual[tipo][proyecto] || 0) + 1;
        }

        if (fecha.getMonth() === mesAnterior && fecha.getFullYear() === añoMesAnterior) {
            conteoAnterior[tipo][proyecto] = (conteoAnterior[tipo][proyecto] || 0) + 1;
        }

    });

    const colores = [
        "#4dc9f6","#f67019","#f53794","#537bc4",
        "#acc236","#166a8f","#00a950","#58595b","#8549ba"
    ];

    let datasets = [];

    listaTipos.forEach((tipo, i) => {

        datasets.push({
            label: `${tipo} (${nombreMesActual})`,
            data: listaProyectos.map(p => conteoActual[tipo][p] || 0),
            backgroundColor: colores[i % colores.length],
            stack: "mesActual"
        });

        datasets.push({
            label: `${tipo} (${nombreMesAnterior})`,
            data: listaProyectos.map(p => conteoAnterior[tipo][p] || 0),
            backgroundColor: colores[i % colores.length],
            stack: "mesAnterior"
        });

    });

    const ctx = document.getElementById("grafico").getContext("2d");

    new Chart(ctx, {

        type: "bar",

        data: {
            labels: listaProyectos,
            datasets: datasets
        },

        options: {

            indexAxis: "y",

            responsive: true,

            plugins: {
                legend: {
                    position: "bottom"
                }
            },

            scales: {

                x: {
                    stacked: true,
                    beginAtZero: true,
                    title: {
                        display: true,
                        text: "Cantidad de registros"
                    }
                },

                y: {
                    stacked: true,
                    title: {
                        display: true,
                        text: "Proyecto"
                    }
                }

            }

        }

    });

})
.catch(error => {

    document.body.innerHTML +=
    `<div style="color:red;text-align:center;margin-top:50px">
    ❌ Error: ${error.message}
    </div>`;

});

</script>
