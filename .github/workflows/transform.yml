name: Transformar Estado Obra

permissions:
  contents: write

on:
  push:
    paths:
      - 'data/original/estadoObra.xlsx'

jobs:
  transform:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          pip install pandas openpyxl

      - name: Ejecutar script de transformación
        run: |
          python scripts/transform.py

      - name: Commit archivo transformado
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/transformed/estadoObra_filtrado.xlsx
          git commit -m "Actualiza archivo filtrado automáticamente" || echo "Sin cambios"
          git push
